name: Insurance Policy Management CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Source Code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Create Environment File
      - name: Create Environment File
        run: |
          echo "MYSQL_ROOT_PASSWORD=root123" > .env
          echo "MYSQL_DATABASE=insurance_db" >> .env
          echo "MYSQL_USER=insurance_user" >> .env
          echo "MYSQL_PASSWORD=insurance123" >> .env

         - name: Show Repository Files
          run: |
          pwd
          ls -R

      # 4. Build Images
      - name: Build Docker Images
        run: docker compose build

      # 5. Run Containers
      - name: Run Containers
        run: docker compose up -d

      # 6. Show Running Containers
      - name: Check Containers
        run: docker compose ps

      # 7. Wait for Startup
      - name: Wait for Application
        run: sleep 20

      # 8. Test Application
      - name: Test Frontend
        run: curl --fail http://localhost

      - name: Test Backend API
        run: curl --fail http://localhost/api/policies

      # 9. Push Images
      - name: Push Docker Images
        run: docker compose push

      # 10. Show Logs
      - name: Show Logs
        if: always()
        run: docker compose logs

      # 11. Stop Containers
      - name: Stop Containers
        if: always()
        run: docker compose down
